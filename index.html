<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', -apple-system, sans-serif; background: #fff9fb; min-height: 100vh; }
  .wrap { max-width: 480px; margin: 0 auto; padding: 0 0 3rem; }

  .header { text-align: center; padding: 2rem 1rem 1rem; }
  .title { font-size: 22px; font-weight: 600; color: #2c2c2a; line-height: 1.3; }
  .subtitle { font-size: 13px; color: #888780; margin-top: 6px; }

  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 0 1rem; margin-bottom: .9rem; }
  .stat { background: #fff; border-radius: 12px; padding: 12px 6px; text-align: center; border: 0.5px solid #e8e4e0; }
  .stat-num { font-size: 22px; font-weight: 600; color: #2c2c2a; }
  .stat-label { font-size: 11px; color: #888780; margin-top: 2px; }

  .pbar-wrap { background: #f1efe8; border-radius: 999px; height: 6px; margin: 0 1rem 1.4rem; }
  .pbar-fill { background: #D4537E; height: 6px; border-radius: 999px; transition: width .4s ease; }

  .sec-label { font-size: 11px; font-weight: 600; color: #888780; letter-spacing: .06em; text-transform: uppercase; padding: 0 1rem 8px; }
  .list { display: flex; flex-direction: column; gap: 7px; padding: 0 1rem; }

  .item { display: flex; align-items: center; gap: 10px; padding: 13px 12px; border-radius: 14px; border: 0.5px solid #e8e4e0; background: #fff; transition: background .15s; }
  .item.done { background: #FBEAF0; border-color: #F4C0D1; }
  .item-num { font-size: 11px; color: #b4b2a9; min-width: 14px; font-weight: 500; flex-shrink: 0; }
  .item-icon { font-size: 20px; width: 28px; text-align: center; flex-shrink: 0; cursor: pointer; border-radius: 6px; transition: background .1s; -webkit-tap-highlight-color: transparent; }
  .item-icon:active { background: #f1efe8; }
  .item-icon-hint { position: relative; }
  .item-text { flex: 1; font-size: 14px; color: #2c2c2a; line-height: 1.45; word-break: keep-all; }
  .item.done .item-text { color: #72243E; }
  .item-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .check-btn { width: 38px; height: 38px; border-radius: 50%; border: 1.5px solid #d3d1c7; background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; color: #b4b2a9; -webkit-tap-highlight-color: transparent; transition: background .15s, border-color .15s; }
  .item.done .check-btn { background: #D4537E; border-color: #D4537E; color: #fff; }
  .del-btn { width: 32px; height: 32px; border-radius: 50%; border: none; background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; color: #b4b2a9; -webkit-tap-highlight-color: transparent; }
  .del-btn:active { background: #f1efe8; }

  .gap { height: 1rem; }
  .add-area { padding: 1rem 1rem 0; }
  .add-row { display: flex; gap: 8px; align-items: center; }
  .emoji-pick-btn { font-size: 22px; width: 48px; height: 48px; border-radius: 12px; border: 1px solid #d3d1c7; background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
  .emoji-pick-btn:active { background: #f1efe8; }
  .add-input { flex: 1; font-size: 15px; padding: 12px 14px; border-radius: 12px; border: 1px solid #d3d1c7; background: #fff; color: #2c2c2a; outline: none; min-width: 0; -webkit-appearance: none; font-family: inherit; height: 48px; }
  .add-input:focus { border-color: #D4537E; box-shadow: 0 0 0 3px #FBEAF0; }
  .add-btn { font-size: 15px; padding: 0 16px; border-radius: 12px; border: none; background: #D4537E; color: #fff; cursor: pointer; font-weight: 600; white-space: nowrap; flex-shrink: 0; font-family: inherit; height: 48px; }
  .add-btn:active { background: #993556; }
  .add-btn:disabled { background: #e0b0be; cursor: default; }

  /* Emoji picker overlay */
  .emoji-overlay { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.35); align-items: flex-end; justify-content: center; }
  .emoji-overlay.open { display: flex; }
  .emoji-sheet { background: #fff; border-radius: 20px 20px 0 0; padding: 1rem; width: 100%; max-width: 480px; max-height: 65vh; display: flex; flex-direction: column; }
  .emoji-sheet-title { font-size: 13px; color: #888780; font-weight: 600; letter-spacing: .05em; text-align: center; margin-bottom: 10px; flex-shrink: 0; }
  .emoji-scroll { overflow-y: auto; flex: 1; }
  .emoji-category { margin-bottom: 14px; }
  .emoji-cat-label { font-size: 11px; color: #b4b2a9; font-weight: 600; letter-spacing: .06em; margin-bottom: 6px; padding: 0 2px; }
  .emoji-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; }
  .emoji-cell { font-size: 24px; width: 100%; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 10px; border: none; background: none; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: background .1s; }
  .emoji-cell:active { background: #FBEAF0; }
  .emoji-close { display: block; width: 100%; margin-top: 8px; padding: 13px; border-radius: 12px; border: none; background: #f1efe8; color: #2c2c2a; font-size: 15px; font-family: inherit; cursor: pointer; font-weight: 500; flex-shrink: 0; }
  .emoji-add-section { border-top: 0.5px solid #e8e4e0; margin-top: 10px; padding-top: 10px; flex-shrink: 0; }
  .emoji-add-title { font-size: 11px; color: #b4b2a9; font-weight: 600; letter-spacing: .06em; margin-bottom: 8px; }
  .emoji-add-row { display: flex; gap: 6px; align-items: center; }
  .emoji-custom-input { width: 52px; font-size: 20px; padding: 8px; border-radius: 10px; border: 1px solid #d3d1c7; background: #fff; outline: none; font-family: inherit; text-align: center; flex-shrink: 0; }
  .emoji-custom-input:focus { border-color: #D4537E; box-shadow: 0 0 0 3px #FBEAF0; }
  .emoji-cat-select { flex: 1; font-size: 13px; padding: 8px 10px; border-radius: 10px; border: 1px solid #d3d1c7; background: #fff; color: #2c2c2a; outline: none; font-family: inherit; -webkit-appearance: none; appearance: none; min-width: 0; }
  .emoji-cat-select:focus { border-color: #D4537E; }
  .emoji-custom-add { padding: 8px 14px; border-radius: 10px; border: none; background: #D4537E; color: #fff; font-size: 13px; font-family: inherit; font-weight: 600; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
  .emoji-custom-add:active { background: #993556; }
  .emoji-custom-section .emoji-cat-label { color: #D4537E; }

  .footer { text-align: center; padding: 1.5rem 1rem 0; font-size: 13px; color: #888780; }
  .heart { color: #D4537E; }

  .status-bar { text-align: center; padding: .5rem 1rem 0; font-size: 12px; }
  .status-bar span { display: inline-block; padding: 3px 10px; border-radius: 99px; }
  .status-connecting { background: #fff3cd; color: #856404; }
  .status-online { background: #d4edda; color: #155724; }
  .status-error { background: #f8d7da; color: #721c24; }

  .done-section { display: none; }

</style>

// ── 이모지 피커 빌드 ──

// ── 커스텀 이모지 저장 (카테고리별, localStorage) ──
const CUSTOM_KEY = 'bucket_custom_emojis_v2';
let customByCategory = JSON.parse(localStorage.getItem(CUSTOM_KEY) || '{}');

function saveCustomEmojis() {
  localStorage.setItem(CUSTOM_KEY, JSON.stringify(customByCategory));
}

function getFirstEmoji(str) {
  const seg = [...(new Intl.Segmenter('ko', {granularity:'grapheme'})).segment(str)];
  return seg.length > 0 ? seg[0].segment : null;
}

// 카테고리 select 채우기
const catSelect = document.getElementById('emoji-cat-select');
EMOJI_CATEGORIES.forEach((cat, i) => {
  const opt = document.createElement('option');
  opt.value = i;
  opt.textContent = cat.label;
  catSelect.appendChild(opt);
});

// 카테고리 그리드 엘리먼트 맵 (나중에 추가할 때 접근용)
const catGridEls = [];
const catContainer = document.getElementById('emoji-categories');

function makeEmojiBtn(em, catIdx, isCustom) {
  const btn = document.createElement('button');
  btn.className = 'emoji-cell';
  btn.textContent = em;
  btn.onclick = () => onEmojiPick(em);

  let pressTimer = null;
  const startPress = () => {
    pressTimer = setTimeout(() => {
      if (confirm(em + ' 이모지를 삭제할까요?')) {
        if (isCustom) {
          customByCategory[catIdx] = (customByCategory[catIdx] || []).filter(x => x !== em);
        } else {
          const delKey = 'del_' + catIdx;
          if (!customByCategory[delKey]) customByCategory[delKey] = [];
          if (!customByCategory[delKey].includes(em)) customByCategory[delKey].push(em);
        }
        saveCustomEmojis();
        btn.remove();
      }
    }, 600);
  };
  const cancelPress = () => clearTimeout(pressTimer);
  btn.addEventListener('mousedown', startPress);
  btn.addEventListener('touchstart', startPress, {passive:true});
  btn.addEventListener('mouseup', cancelPress);
  btn.addEventListener('mouseleave', cancelPress);
  btn.addEventListener('touchend', cancelPress);
  btn.addEventListener('touchcancel', cancelPress);
  btn.title = '꾹 누르면 삭제';

  return btn;
}

// 카테고리별 그리드 빌드 (커스텀 포함)
function buildEmojiGrid(cat, customList, idx) {
  const wrap = document.createElement('div');
  wrap.className = 'emoji-category';
  const label = document.createElement('div');
  label.className = 'emoji-cat-label';
  label.textContent = cat.label;
  const grid = document.createElement('div');
  grid.className = 'emoji-grid';
  grid.id = 'emoji-grid-' + idx;

  const deletedDefault = customByCategory['del_' + idx] || [];
  cat.emojis.filter(em => !deletedDefault.includes(em)).forEach(em => grid.appendChild(makeEmojiBtn(em, idx, false)));
  (customList || []).forEach(em => grid.appendChild(makeEmojiBtn(em, idx, true)));

  wrap.appendChild(label);
  wrap.appendChild(grid);
  catContainer.appendChild(wrap);
  catGridEls.push(grid);
}

EMOJI_CATEGORIES.forEach((cat, i) => {
  buildEmojiGrid(cat, customByCategory[i], i);
});

// 커스텀 추가 버튼
document.getElementById('emoji-custom-add').onclick = () => {
  const inp = document.getElementById('emoji-custom-input');
  const val = inp.value.trim();
  const em = getFirstEmoji(val);
  if (!em) { inp.style.borderColor = '#D4537E'; setTimeout(()=>inp.style.borderColor='',1000); return; }
  inp.style.borderColor = '';

  const catIdx = parseInt(catSelect.value);
  if (!customByCategory[catIdx]) customByCategory[catIdx] = [];
  if (!customByCategory[catIdx].includes(em) && !EMOJI_CATEGORIES[catIdx].emojis.includes(em)) {
    customByCategory[catIdx].push(em);
    saveCustomEmojis();
    catGridEls[catIdx].appendChild(makeEmojiBtn(em, catIdx, true));
  }
  onEmojiPick(em);
  inp.value = '';
};
document.getElementById('emoji-custom-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('emoji-custom-add').click();
});

// ── 피커 상태 ──
const overlay = document.getElementById('emoji-overlay');
let pickerMode = 'new'; // 'new' | 'edit'
let editingItemId = null;
let selectedEmoji = '⭐';
const pickBtn = document.getElementById('emoji-pick-btn');

function openPicker(mode, itemId = null) {
  pickerMode = mode;
  editingItemId = itemId;
  document.getElementById('emoji-sheet-title').textContent =
    mode === 'edit' ? '이모지 변경' : '이모지 선택';
  document.getElementById('emoji-custom-input').value = '';
  overlay.classList.add('open');
}

function onEmojiPick(em) {
  overlay.classList.remove('open');
  if (pickerMode === 'new') {
    selectedEmoji = em;
    pickBtn.textContent = em;
  } else if (pickerMode === 'edit' && editingItemId) {
    update(ref(db, 'bucketlist/items/' + editingItemId), { emoji: em });
  }
}

document.getElementById('emoji-close').onclick = () => overlay.classList.remove('open');
overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
pickBtn.onclick = () => openPicker('new');

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const itemsRef = ref(db, 'bucketlist/items');

function setStatus(type, msg) {
  const el = document.getElementById('status-msg');
  el.className = 'status-' + type;
  el.textContent = msg;
}

async function initData() {
  const snap = await get(itemsRef);
  if (!snap.exists()) {
    const obj = {};
    DEFAULT_ITEMS.forEach(item => { obj[item.id] = item; });
    await set(itemsRef, obj);
  }
}

function subscribe() {
  onValue(itemsRef, (snap) => {
    setStatus('online', '✅ 실시간 연결됨');
    const data = snap.val() || {};
    const items = Object.values(data).sort((a, b) => (a.order||0) - (b.order||0));
    render(items);
  }, (err) => {
    setStatus('error', '❌ 연결 오류 — ' + err.message);
  });
}

function render(items) {
  const done = items.filter(i => i.done);
  const todo = items.filter(i => !i.done);
  const total = items.length;
  const pct = total > 0 ? Math.round(done.length / total * 100) : 0;

  document.getElementById('cnt-done').textContent = done.length;
  document.getElementById('cnt-todo').textContent = todo.length;
  document.getElementById('cnt-total').textContent = total;
  document.getElementById('pbar').style.width = pct + '%';
  document.getElementById('footer-txt').innerHTML =
    '<span class="heart">♡</span> ' + total + '개 중 ' + done.length + '개 완료 · ' + pct + '% 달성 <span class="heart">♡</span>';

  const ld = document.getElementById('list-done');
  const lt = document.getElementById('list-todo');
  ld.innerHTML = ''; lt.innerHTML = '';
  done.forEach((item, i) => ld.appendChild(makeItem(item, i + 1)));
  todo.forEach((item, i) => lt.appendChild(makeItem(item, i + 1)));

  document.getElementById('done-sec').style.display = done.length ? 'block' : 'none';
  document.getElementById('todo-sec').style.display = todo.length ? 'block' : 'none';
}

function makeItem(item, idx) {
  const d = document.createElement('div');
  d.className = 'item' + (item.done ? ' done' : '');

  const num = document.createElement('span');
  num.className = 'item-num'; num.textContent = idx;

  const ic = document.createElement('span');
  ic.className = 'item-icon';
  ic.textContent = item.emoji || '⭐';
  ic.title = '이모지 변경';
  ic.onclick = () => openPicker('edit', item.id);

  const tx = document.createElement('span');
  tx.className = 'item-text'; tx.textContent = item.text;

  const acts = document.createElement('div');
  acts.className = 'item-actions';

  const cb = document.createElement('button');
  cb.className = 'check-btn';
  cb.textContent = item.done ? '✓' : '○';
  cb.setAttribute('aria-label', item.done ? '미완료로 변경' : '완료로 표시');
  cb.onclick = () => update(ref(db, 'bucketlist/items/' + item.id), { done: !item.done });

  const dl = document.createElement('button');
  dl.className = 'del-btn'; dl.textContent = '✕';
  dl.setAttribute('aria-label', '삭제');
  dl.onclick = () => {
    if (confirm('"' + item.text + '"\n삭제할까요?')) {
      remove(ref(db, 'bucketlist/items/' + item.id));
    }
  };

  acts.append(cb, dl);
  d.append(num, ic, tx, acts);
  return d;
}

async function addItem() {
  const inp = document.getElementById('new-item');
  const t = inp.value.trim();
  if (!t) return;
  const btn = document.getElementById('add-btn');
  btn.disabled = true;

  const snap = await get(itemsRef);
  const data = snap.val() || {};
  const maxOrder = Object.values(data).reduce((m, i) => Math.max(m, i.order || 0), 0);
  const newId = Date.now().toString();
  await set(ref(db, 'bucketlist/items/' + newId), {
    id: newId, text: t, done: false, emoji: selectedEmoji, order: maxOrder + 1
  });
  inp.value = '';
  selectedEmoji = '⭐';
  pickBtn.textContent = '⭐';
  btn.disabled = false;
  inp.focus();
}

document.getElementById('add-btn').onclick = addItem;
document.getElementById('new-item').addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

setStatus('connecting', '🔄 연결 중...');
initData().then(subscribe).catch(err => setStatus('error', '❌ ' + err.message));
</script>
</body>
</html>
